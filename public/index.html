<!DOCTYPE html>
<html>
<head>
  <title>Chat_As_You_Like</title>

  <!-- ✅ MOBILE FIX (UPDATED) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="lobby" id="lobby">

  <h1 class="title">Chat_As_You_Like</h1>
  <p class="subtitle">Talk with Buddies</p>

  <div class="buttons">
    <button onclick="joinRandom()">Join Random Room</button>
    <button onclick="createRoom()">Create Room</button>
  </div>

  <div class="search-box">
    <input id="searchRoom" placeholder="Search rooms..." oninput="filterRooms()">
  </div>

  <div id="roomCards" class="rooms"></div>

</div>


<!-- CHAT SCREEN -->
<div id="chatApp" class="chat-app" style="display:none;">

  <div class="chat-header">
    <span id="roomName"></span>
    <button onclick="leaveRoom()">Exit</button>
  </div>

  <div id="chatBox" class="chat-box"></div>

  <div class="chat-input">
    <input id="messageInput" placeholder="Type message...">
    <button onclick="sendMessage()">➤</button>
    <button onclick="openFile()">📎</button>
  </div>

  <!-- FILE INPUT -->
  <input type="file" id="fileInput" style="display:none">

</div>

<!-- ✅ ADDED ONLY THIS (NO CHANGE ABOVE) -->
<div id="userPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:999;">

  <div style="background:white; padding:20px; border-radius:10px; width:300px; text-align:center;">

    <h3>Enter Details</h3>

    <input id="nameInput" placeholder="Your name" style="width:100%; margin:10px 0; padding:10px;">

    <select id="genderInput" style="width:100%; padding:10px;">
      <option value="">Select Gender</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
    </select>

    <input type="file" id="avatarInput" style="margin-top:10px;">

    <br><br>

    <button onclick="confirmUser()">Continue</button>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
