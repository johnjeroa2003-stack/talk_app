<!DOCTYPE html>
<html>
<head>
  <title>Chat_As_You_Like</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOBBY -->
<div id="lobby">
  <h1 class="logo">Chat_As_You_Like</h1>
  <p class="subtitle">Talk with Buddies</p>

  <div class="top-buttons">
    <button onclick="joinRandom()">Join Random Room</button>
    <button onclick="createRoom()">Create Room</button>
  </div>

  <input id="searchRoom" placeholder="Search rooms..." oninput="filterRooms()" />

  <div id="roomCards" class="room-cards"></div>
</div>

<!-- CHAT -->
<div id="chatApp" style="display:none;">

  <div class="chat-app">

    <div id="roomList"></div>

    <div class="chat-container">

      <div class="chat-header">
        <span id="roomName"></span>

        <div>
          <button onclick="startVoice()">🎤</button>
          <button onclick="leaveRoom()">Exit</button>
        </div>
      </div>

      <div id="chatBox" class="chat-box"></div>

      <div id="typingStatus"></div>

      <div class="chat-input">
        <input id="messageInput" placeholder="Type message..." />
        <button onclick="sendMessage()">➤</button>
        <button onclick="openFile()">📎</button>
      </div>

    </div>

    <div id="usersList"></div>

  </div>

</div>

<input type="file" id="fileInput" style="display:none">

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
