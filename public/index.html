<!DOCTYPE html>
<html>
<head>
    <title>Chat_As_You_Like</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔥 LOBBY (UNCHANGED UI) -->
<div id="lobby" style="text-align:center; padding-top:50px;">

    <h1 style="font-size:60px;">Chat_As_You_Like</h1>
    <p style="color:gray;">Talk with Buddies</p>

    <button onclick="joinRandom()">Join Random Room</button>
    <button onclick="createRoom()">Create Room</button>

    <br><br>

    <input id="searchRoom" placeholder="Search rooms..." oninput="filterRooms()" />

    <div id="roomCards" style="margin-top:40px;"></div>

</div>

<!-- 💬 CHAT (YOUR ORIGINAL UI) -->
<div id="chatApp" class="chat-app" style="display:none;">

    <div id="roomList"></div>

    <div class="chat-container">

        <div class="chat-header">
            <span id="roomName">Select Room</span>
            <button onclick="leaveRoom()">Exit</button>
        </div>

        <div id="chatBox" class="chat-box"></div>

        <div id="typingStatus" style="color:gray; font-size:12px;"></div>

        <div class="chat-input">
            <input id="messageInput" placeholder="Type message..." />
            <button onclick="sendMessage()">➤</button>
        </div>

    </div>

    <div id="usersList"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
