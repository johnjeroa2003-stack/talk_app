<!DOCTYPE html>
<html>
<head>
  <title>Chat_As_You_Like</title>

  <!-- ✅ MOBILE FIX (UPDATED) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="lobby" id="lobby">

  <h1 class="title">Chat_As_You_Like</h1>
  <p class="subtitle">Talk with Buddies</p>

  <div class="buttons">
    <button onclick="joinRandom()">Join Random Room</button>
    <button onclick="createRoom()">Create Room</button>
  </div>

  <div class="search-box">
    <input id="searchRoom" placeholder="Search rooms..." oninput="filterRooms()">
  </div>

  <div id="roomCards" class="rooms"></div>

</div>


<!-- CHAT SCREEN -->
<div id="chatApp" class="chat-app" style="display:none;">

  <div class="chat-header">
    <span id="roomName"></span>
    <button onclick="leaveRoom()">Exit</button>
  </div>

  <div id="chatBox" class="chat-box"></div>

  <div class="chat-input">
    <input id="messageInput" placeholder="Type message...">
    <button onclick="sendMessage()">➤</button>
    <button onclick="openFile()">📎</button>
  </div>

  <!-- FILE INPUT -->
  <input type="file" id="fileInput" style="display:none">

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
