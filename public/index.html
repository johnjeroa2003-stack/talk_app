<!DOCTYPE html>
<html>
<head>
  <title>Chat_As_You_Like</title>

  <!-- ✅ MOBILE FIX -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="stylesheet" href="style.css">
</head>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">

  <div class="login-card">

    <div class="login-left">
      <div class="profile-circle"></div>
      <h2>Sign In</h2>
      <p class="small-text">Don't have account?<br><span>Sign up!</span></p>
    </div>

    <div class="login-right">

      <input id="loginEmail" placeholder="Email">
      <input id="loginPassword" type="password" placeholder="Password">

      <button onclick="loginUser()">LOGIN</button>

    </div>

  </div>

</div>

<body>

<div class="lobby" id="lobby">

  <h1 class="title">Chat_As_You_Like</h1>
  <p class="subtitle">Talk with Buddies</p>

  <div class="buttons">
    <button onclick="joinRandom()">Join Random Room</button>
    <button onclick="createRoom()">Create Room</button>
  </div>

  <div class="search-box">
    <input id="searchRoom" placeholder="Search rooms..." oninput="filterRooms()">
  </div>

  <div id="roomCards" class="rooms"></div>

</div>

<!-- LOGIN OVERLAY (ADD ONLY) -->
<div id="loginScreen" style="
position:fixed;
top:0;left:0;width:100%;height:100%;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#d63384,#ff6ec7);
z-index:9999;
">

  <div style="
    width:700px;
    height:350px;
    display:flex;
    border-radius:20px;
    overflow:hidden;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
  ">

    <!-- LEFT -->
    <div style="
      width:40%;
      color:white;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
    ">
      <div style="
        width:80px;height:80px;
        border-radius:50%;
        background:white;
        margin-bottom:10px;
      "></div>

      <h2>Sign In</h2>
      <p style="font-size:12px;text-align:center;">
        Chat_As_You_Like
      </p>
    </div>

    <!-- RIGHT -->
    <div style="
      width:60%;
      background:rgba(255,255,255,0.2);
      display:flex;
      flex-direction:column;
      justify-content:center;
      padding:30px;
    ">

      <input id="loginEmail" placeholder="Email"
        style="padding:12px;margin:10px 0;border:none;border-radius:6px;">

      <input id="loginPassword" type="password" placeholder="Password"
        style="padding:12px;margin:10px 0;border:none;border-radius:6px;">

      <button onclick="loginUser()"
        style="padding:12px;background:black;color:white;border:none;border-radius:20px;">
        LOGIN
      </button>

    </div>

  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chatApp" class="chat-app" style="display:none;">

  <div class="chat-header">
    <span id="roomName"></span>
    <button onclick="leaveRoom()">Exit</button>
  </div>

  <div id="onlineUsers" class="online-users"></div>

  <!-- ✅ WRAPPER -->
  <div class="chat-body">
    <div id="chatBox" class="chat-box"></div>
  </div>

  <div id="typingStatus" style="padding:5px; font-size:12px; color:gray;"></div>

  <!-- ✅ REPLY BOX -->
  <div id="replyBox" style="display:none; padding:5px; background:#eee;">
    Replying: <span id="replyText"></span>
    <button onclick="cancelReply()">❌</button>
  </div>

  <!-- ✅ INPUT AREA (🎤 ADDED HERE) -->
  <div class="chat-input">
    <input id="messageInput" placeholder="Type message...">
    <button onclick="sendMessage()">➤</button>
    <button onclick="openFile()">📎</button>
    <button id="recordBtn">🎤</button>
  </div>

  <!-- FILE INPUT -->
  <input type="file" id="fileInput" style="display:none">

</div>

<!-- USER POPUP -->
<div id="userPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:999;">

  <div style="background:white; padding:20px; border-radius:10px; width:300px; text-align:center;">

    <h3>Enter Details</h3>

    <input id="nameInput" placeholder="Your name" style="width:100%; margin:10px 0; padding:10px;">

    <select id="genderInput" style="width:100%; padding:10px;">
      <option value="">Select Gender</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
    </select>

    <input type="file" id="avatarInput" style="margin-top:10px;">

    <br><br>

    <button onclick="confirmUser()">Continue</button>

  </div>

</div>

<!-- SOCKET -->
<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

<!-- PRIVATE CHAT POPUP -->
<div id="dmBox" style="display:none; position:fixed; bottom:0; right:10px; width:250px; background:white; border:1px solid #ccc; border-radius:10px; z-index:999;">

  <div style="background:#333; color:white; padding:8px; display:flex; justify-content:space-between;">
    <span id="dmUser"></span>
    <button onclick="closeDM()">X</button>
  </div>

  <div id="dmMessages" style="height:200px; overflow-y:auto; padding:5px;"></div>

  <div style="display:flex;">
    <input id="dmInput" style="flex:1; padding:5px;">
    <button onclick="sendDM()">➤</button>
  </div>

</div>

</body>
</html>
