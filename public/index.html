<!DOCTYPE html>
<html>
<head>
  <title>Chat_As_You_Like</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="lobby">

  <h1 class="title">Chat_As_You_Like</h1>
  <p class="subtitle">Talk with Buddies</p>

  <div class="buttons">
    <button onclick="joinRandom()">Join Random Room</button>
    <button onclick="createRoom()">Create Room</button>
  </div>

  <div class="search-box">
    <input id="searchRoom" placeholder="Search rooms...">
  </div>

  <div class="rooms">

    <div class="card">
      <h3>General</h3>
      <p>0 people inside</p>
    </div>

    <div class="card">
      <h3>Fun</h3>
      <p>0 people inside</p>
    </div>

    <div class="card">
      <h3>Study</h3>
      <p>0 people inside</p>
    </div>

  </div>

</div>

</body>
</html>
